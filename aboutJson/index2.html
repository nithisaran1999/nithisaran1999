<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- jQuery JS 3.1.0 -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <title>Test Ajax</title>
</head>

<body>
    <div id="id1"></div>
</body>

</html>
<script>
    $(function () {
        var obj = [
            {
                "name" : "x",
                "age": 12,
                "email":"x@gmail.com"
            },
            {
                "name" : "z",
                "age": 14,
                "email":"z@gmail.com"
            },
            {
                "name" : "c",
                "age": 15,
                "email":"c@gmail.com"
            }
        ]

        
        var x=""
        obj[0].name = "zzz"
        for (i in obj){
            x+=` <br> Name : ${obj[i].name} <br> Age : ${obj[i].age} <br> Mail : ${obj[i].email}`
        }
        $("#id1").html(x)
    
    })

</script>
