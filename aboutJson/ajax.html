<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- jQuery JS 3.1.0 -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <title>getJson</title>
</head>

<body>
    <script>
        $(function () {
            $.getJSON("employee.json", function (data) {
                $.each(data, function (i, value) {
                    $("#id2").append(`
                    <tr>
                    <td>${i + 1}</td>
                    <td>${value.name}</td>
                    <td>${value.age}</td>
                    <td>${value.email}</td>
                    <td>${value.address}</td>
                    </tr>
                    `);
                });

            });

        });
    </script>
    <div id="id1">
        <table border="1" width="450px" id="id2">
            <tr>
                <th>ID</th>
                <th>Name</th>

                <th>Age</th>

                <th>Mail</th>

                <th>Address</th>
            </tr>

        </table>
    </div>
</body>

</html>
